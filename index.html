<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullA Browser - Free Extensions Directory</title>
    <style>
        body { font-family: sans-serif; background: #1c1c1c; color: #e6e6e6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #3a3a3a; padding-bottom: 10px; }
        .addon-card { background: #2c2c2c; padding: 15px; margin-bottom: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .addon-info h3 { margin: 0 0 5px 0; color: #0078d4; }
        .addon-info p { margin: 0; color: #aaa; font-size: 14px; }
        .install-btn { background: #0078d4; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; }
        .install-btn:hover { background: #005a9e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NullA Extensions Directory</h1>
        <p style="color: #888;">Every extension listed here is completely free and open-source.</p>
        <div id="addons-list">Loading repository items...</div>
    </div>

    <script>
        fetch('extensions.json')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('addons-list');
                list.innerHTML = '';
                data.forEach(addon => {
                    list.innerHTML += `
                        <div class="addon-card">
                            <div class="addon-info">
                                <h3>${addon.name} <small style="color:#666; font-size:11px;">v${addon.version}</small></h3>
                                <p>${addon.description}</p>
                                <small style="color:#888;">Developer: ${addon.author}</small>
                            </div>
                            <a href="${addon.download_url}" class="install-btn">Add</a>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
